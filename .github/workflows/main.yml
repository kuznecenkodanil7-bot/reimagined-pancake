name: Build Fabric Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.2.1'

      - name: Build mod
        run: gradle build --no-daemon

      - name: Upload mod jar
        uses: actions/upload-artifact@v6
        with:
          name: ModerationHelperGUI-Fabric-jar
          path: build/libs/*.jar
